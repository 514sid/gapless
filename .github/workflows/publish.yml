name: Publish

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      target:
        description: "Publishing target"
        required: true
        default: "github"
        type: choice
        options: [ github, ossrh ]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish to ${{ github.event.inputs.target || 'GitHub Packages + OSSRH' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to GitHub Packages
        if: ${{ github.event_name == 'release' || github.event.inputs.target == 'github' }}
        run: ./gradlew :library:publishReleasePublicationToGitHubPackagesRepository
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Maven Central (OSSRH)
        if: ${{ github.event_name == 'release' || github.event.inputs.target == 'ossrh' }}
        run: ./gradlew :library:publishReleasePublicationToOSSRHRepository
        env:
          OSSRH_USERNAME:       ${{ secrets.OSSRH_TOKEN_KEY }}
          OSSRH_PASSWORD:       ${{ secrets.OSSRH_TOKEN_PASSWORD }}
          GPG_SIGNING_KEY:      ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}